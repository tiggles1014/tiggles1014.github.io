<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I love you aoud</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            height: 100vh;
            overflow: hidden;
            position: relative;
            font-family: 'Inter', sans-serif;
            color: #ff99cc;
            background: #0a0a0a;
        }
        
        .background {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url('bg.png');
            background-size: cover;
            background-position: center;
            filter: brightness(0.75) contrast(1.1) saturate(0.9);
            z-index: -3;
        }
        
        .overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(15, 0, 25, 0.78);
            z-index: -2;
        }
        /* ── Click-to-start splash ── */
        #startScreen {
            position: fixed;
            inset: 0;
            z-index: 999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(5, 0, 12, 0.88);
            cursor: pointer;
            transition: opacity 0.6s ease;
        }
        #startScreen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        #startScreen .play-btn {
            width: 90px;
            height: 90px;
            border: 3px solid #ff66aa;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.4rem;
            color: #ff99cc;
            margin-bottom: 20px;
            transition: background 0.2s;
        }
        #startScreen:hover .play-btn {
            background: rgba(255, 102, 170, 0.2);
        }
        #startScreen p {
            font-size: 1.1rem;
            color: #cc88aa;
            letter-spacing: 2px;
        }
        
        .content {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        
        h1 {
            font-size: 5.2rem;
            letter-spacing: 4px;
            color: #ff99cc;
            text-shadow: 3px 3px 0 #000, -2px -2px 0 #000;
            margin-bottom: 8px;
            font-weight: 300;
        }
        
        .subtitle {
            font-size: 2.1rem;
            color: #ff77bb;
            margin-bottom: 50px;
            font-weight: 300;
        }
        
        .player {
            width: 440px;
            background: rgba(25, 5, 35, 0.96);
            border: 4px solid #ff66aa;
            padding: 25px 30px;
            border-radius: 8px;
            box-shadow: 0 0 35px rgba(255, 102, 170, 0.5);
            margin-bottom: 40px;
        }
        
        .now-playing {
            font-size: 1rem;
            letter-spacing: 3px;
            margin-bottom: 12px;
            color: #ffbbdd;
            text-transform: uppercase;
        }
        
        .progress-container {
            height: 8px;
            background: #330022;
            margin: 20px 0;
            position: relative;
            cursor: pointer;
            border-radius: 4px;
        }
        
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(to right, #ff66aa, #cc44ff);
            transition: width 0.9s linear;
            border-radius: 4px;
        }
        
        .time {
            display: flex;
            justify-content: space-between;
            font-size: 0.95rem;
            color: #bb77aa;
        }
        
        .controls {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 25px;
        }
        
        button {
            background: transparent;
            border: 2px solid #ff66aa;
            color: #ffccdd;
            padding: 10px 24px;
            font-size: 0.95rem;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            letter-spacing: 1px;
            transition: background 0.15s, color 0.15s;
            border-radius: 4px;
        }
        
        button:hover {
            background: #ff66aa;
            color: #000;
        }
        .flash {
            animation: flashPulse 0.7s ease-out;
        }
        @keyframes flashPulse {
            0%   { filter: saturate(3) brightness(1.4); }
            100% { filter: saturate(1) brightness(1); }
        }
        /* YouTube player: real size but visually hidden */
        #ytplayer {
            position: fixed;
            bottom: 0;
            right: 0;
            width: 2px;
            height: 2px;
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="background"></div>
    <div class="overlay"></div>
    <!-- Click-to-start overlay (satisfies browser autoplay policy) -->
    <div id="startScreen" onclick="startEverything()">
        <div class="play-btn">▶</div>
        <p>click to play</p>
    </div>
    
    <div class="content">
        <h1>I LOVE YOU AOUD</h1>
        <div class="subtitle">pupsies</div>
        
        <div class="player">
            <div class="now-playing">Now Playing</div>
            <div style="font-size: 1.4rem; margin-bottom: 6px; color: #ff99cc; font-weight: 400;">
                why didn't you stop me?
            </div>
            <div style="font-size: 0.95rem; color: #cc77aa; margin-bottom: 4px;">
                pupsies &nbsp;·&nbsp; 1:44
            </div>
            
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            
            <div class="time">
                <span id="currentTime">0:00</span>
                <span id="duration">1:44</span>
            </div>
            
            <div class="controls">
                <button id="playPauseBtn" onclick="togglePlay()">⏸ Pause</button>
                <button id="volBtn" onclick="boostVolume()">🔊 Ultra Loud</button>
            </div>
        </div>
    </div>
    <!-- YouTube IFrame API target -->
    <div id="ytplayer"></div>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const progressBar   = document.getElementById('progressBar');
        const currentTimeEl = document.getElementById('currentTime');
        const playPauseBtn  = document.getElementById('playPauseBtn');
        const volBtn        = document.getElementById('volBtn');
        const startScreen   = document.getElementById('startScreen');
        const songDuration = 104; // seconds
        let isPlaying = false;
        let ytPlayer  = null;
        let isBoosted = false;
        let started   = false;
        // ── YouTube IFrame API ──────────────────────────────────────────
        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('ytplayer', {
                videoId: 'xpmf4u5rkNY',
                playerVars: {
                    autoplay:       0,   // we'll call playVideo() after user click
                    loop:           1,
                    playlist:       'xpmf4u5rkNY',
                    controls:       0,
                    modestbranding: 1,
                    rel:            0,
                },
                events: {
                    onReady:       onPlayerReady,
                    onStateChange: onPlayerStateChange,
                }
            });
        }
        function onPlayerReady() {
            ytPlayer.setVolume(80);
            // If the user already clicked before the API was ready, start now
            if (started) ytPlayer.playVideo();
        }
        function onPlayerStateChange(event) {
            if (event.data === YT.PlayerState.PLAYING) {
                isPlaying = true;
            } else if (event.data === YT.PlayerState.PAUSED || event.data === YT.PlayerState.ENDED) {
                isPlaying = false;
                if (event.data === YT.PlayerState.ENDED) {
                    ytPlayer.seekTo(0);
                    ytPlayer.playVideo();
                }
            }
            updatePlayPauseBtn();
        }
        // ── Start on first click ────────────────────────────────────────
        function startEverything() {
            started = true;
            startScreen.classList.add('hidden');
            if (ytPlayer && typeof ytPlayer.playVideo === 'function') {
                ytPlayer.playVideo();
            }
            setInterval(tickProgress, 1000);
        }
        // ── Controls ────────────────────────────────────────────────────
        function togglePlay() {
            if (!ytPlayer) return;
            if (isPlaying) {
                ytPlayer.pauseVideo();
            } else {
                ytPlayer.playVideo();
            }
        }
        function updatePlayPauseBtn() {
            playPauseBtn.textContent = isPlaying ? '⏸ Pause' : '▶ Play';
        }
        function boostVolume() {
            if (!ytPlayer) return;
            if (isBoosted) {
                ytPlayer.setVolume(80);
                isBoosted = false;
                volBtn.textContent = '🔊 Ultra Loud';
            } else {
                ytPlayer.setVolume(100);
                isBoosted = true;
                volBtn.textContent = '🔇 Normal';
                document.body.classList.add('flash');
                document.body.addEventListener('animationend', () => {
                    document.body.classList.remove('flash');
                }, { once: true });
            }
        }
        // ── Progress Bar ────────────────────────────────────────────────
        function tickProgress() {
            if (!isPlaying || !ytPlayer) return;
            let t = 0;
            try { t = ytPlayer.getCurrentTime() || 0; } catch(e) {}
            const progress = t % songDuration;
            progressBar.style.width = (progress / songDuration * 100) + '%';
            const min = Math.floor(progress / 60);
            const sec = Math.floor(progress % 60);
            currentTimeEl.textContent = `${min}:${sec < 10 ? '0' : ''}${sec}`;
        }
        // ── Click to seek ───────────────────────────────────────────────
        document.getElementById('progressContainer').addEventListener('click', function(e) {
            if (!ytPlayer) return;
            const ratio  = (e.clientX - this.getBoundingClientRect().left) / this.offsetWidth;
            const seekTo = ratio * songDuration;
            ytPlayer.seekTo(seekTo, true);
        });
    </script>
</body>
</html>
