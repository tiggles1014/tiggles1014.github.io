<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I love you aoud</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            height: 100vh;
            overflow: hidden;
            position: relative;
            font-family: 'Inter', sans-serif;
            color: #ff99cc;
            background: #0a0a0a;
        }
        
        .background {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url('bg.png');
            background-size: cover;
            background-position: center;
            filter: brightness(0.75) contrast(1.1) saturate(0.9);
            z-index: -3;
        }
        
        .overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(15, 0, 25, 0.78);
            z-index: -2;
        }
        /* ── Unmute banner ── */
        #unmuteBanner {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 14px;
            background: rgba(255, 80, 150, 0.18);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(255, 102, 170, 0.35);
            cursor: pointer;
            transition: opacity 0.5s ease;
        }
        #unmuteBanner.hidden { opacity: 0; pointer-events: none; }
        #unmuteBanner span {
            font-size: 0.9rem;
            letter-spacing: 2px;
            color: #ffccdd;
        }
        #unmuteBanner .pulse {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: #ff66aa;
            animation: pulse 1.2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: 0.4; transform: scale(0.7); }
        }
        
        .content {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        
        h1 {
            font-size: 5.2rem;
            letter-spacing: 4px;
            color: #ff99cc;
            text-shadow: 3px 3px 0 #000, -2px -2px 0 #000;
            margin-bottom: 8px;
            font-weight: 300;
        }
        
        .subtitle {
            font-size: 2.1rem;
            color: #ff77bb;
            margin-bottom: 50px;
            font-weight: 300;
        }
        
        .player {
            width: 440px;
            background: rgba(25, 5, 35, 0.96);
            border: 4px solid #ff66aa;
            padding: 25px 30px;
            border-radius: 8px;
            box-shadow: 0 0 35px rgba(255, 102, 170, 0.5);
            margin-bottom: 40px;
        }
        
        .now-playing {
            font-size: 0.85rem;
            letter-spacing: 3px;
            margin-bottom: 14px;
            color: #ffbbdd;
            text-transform: uppercase;
        }
        .song-title {
            font-size: 1.4rem;
            margin-bottom: 6px;
            color: #ff99cc;
            font-weight: 400;
        }
        .song-meta {
            font-size: 0.9rem;
            color: #cc77aa;
            margin-bottom: 4px;
        }
        
        .progress-container {
            height: 6px;
            background: #330022;
            margin: 20px 0;
            position: relative;
            cursor: pointer;
            border-radius: 3px;
        }
        
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(to right, #ff66aa, #cc44ff);
            transition: width 0.9s linear;
            border-radius: 3px;
        }
        
        .time {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: #bb77aa;
        }
        
        .controls {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 22px;
        }
        
        button {
            background: transparent;
            border: 2px solid #ff66aa;
            color: #ffccdd;
            padding: 9px 22px;
            font-size: 0.88rem;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            letter-spacing: 1px;
            transition: background 0.15s, color 0.15s;
            border-radius: 4px;
        }
        
        button:hover {
            background: #ff66aa;
            color: #000;
        }
        /* Hidden YouTube iframe — real size, off-screen */
        #ytFrame {
            position: fixed;
            left: -9999px;
            top: 0;
            width: 480px;
            height: 270px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <!-- Muted autoplay starts immediately; user clicks this to unmute -->
    <div id="unmuteBanner" onclick="unmute()">
        <div class="pulse"></div>
        <span>🎵 CLICK ANYWHERE TO UNMUTE</span>
        <div class="pulse"></div>
    </div>
    <div class="background"></div>
    <div class="overlay"></div>
    
    <div class="content">
        <h1>I LOVE YOU AOUD</h1>
        <div class="subtitle">pupsies</div>
        
        <div class="player">
            <div class="now-playing">Now Playing</div>
            <div class="song-title">why didn't you stop me?</div>
            <div class="song-meta">pupsies &nbsp;·&nbsp; 1:44</div>
            
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            
            <div class="time">
                <span id="currentTime">0:00</span>
                <span id="duration">1:44</span>
            </div>
            
            <div class="controls">
                <button id="playPauseBtn" onclick="togglePlay()">⏸ Pause</button>
                <button id="volBtn" onclick="toggleBoost()">🔊 Ultra Loud</button>
            </div>
        </div>
    </div>
    <!--
        autoplay=1  → starts playing immediately (muted, so browser allows it)
        mute=1      → muted = browser allows autoplay
        loop=1      → loops forever
        controls=0  → hide YouTube UI
        enablejsapi=1 → lets us send postMessage commands
    -->
    <iframe id="ytFrame"
        src="https://www.youtube.com/embed/xpmf4u5rkNY?autoplay=1&mute=1&loop=1&playlist=xpmf4u5rkNY&controls=0&enablejsapi=1&rel=0&modestbranding=1"
        frameborder="0"
        allow="autoplay; encrypted-media"
        allowfullscreen>
    </iframe>
    <script>
        const ytFrame       = document.getElementById('ytFrame');
        const progressBar   = document.getElementById('progressBar');
        const currentTimeEl = document.getElementById('currentTime');
        const playPauseBtn  = document.getElementById('playPauseBtn');
        const volBtn        = document.getElementById('volBtn');
        const unmuteBanner  = document.getElementById('unmuteBanner');
        const songDuration = 104;
        let isPlaying = true;
        let isMuted   = true;
        let isBoosted = false;
        let progress  = 0;
        // ── PostMessage helpers ─────────────────────────────────────────
        function ytCmd(func, args) {
            ytFrame.contentWindow.postMessage(
                JSON.stringify({ event: 'command', func, args: args || [] }),
                '*'
            );
        }
        // ── Unmute on first click ───────────────────────────────────────
        function unmute() {
            ytCmd('unMute');
            ytCmd('setVolume', [80]);
            isMuted = false;
            unmuteBanner.classList.add('hidden');
        }
        // Also unmute if user clicks anywhere else on the page
        document.body.addEventListener('click', function onFirstClick(e) {
            if (isMuted) {
                unmute();
            }
        }, { once: false });
        // ── Play / Pause ────────────────────────────────────────────────
        function togglePlay() {
            if (isPlaying) {
                ytCmd('pauseVideo');
                isPlaying = false;
                playPauseBtn.textContent = '▶ Play';
            } else {
                ytCmd('playVideo');
                isPlaying = true;
                playPauseBtn.textContent = '⏸ Pause';
            }
        }
        // ── Volume boost ────────────────────────────────────────────────
        function toggleBoost() {
            if (isBoosted) {
                ytCmd('setVolume', [80]);
                isBoosted = false;
                volBtn.textContent = '🔊 Ultra Loud';
            } else {
                ytCmd('setVolume', [100]);
                isBoosted = true;
                volBtn.textContent = '🔇 Normal';
            }
        }
        // ── Progress bar (simulated — iframe can't report time easily) ──
        setInterval(() => {
            if (!isPlaying) return;
            progress = (progress + 1) % songDuration;
            progressBar.style.width = (progress / songDuration * 100) + '%';
            const min = Math.floor(progress / 60);
            const sec = Math.floor(progress % 60);
            currentTimeEl.textContent = `${min}:${sec < 10 ? '0' : ''}${sec}`;
        }, 1000);
        // ── Click progress bar to seek ──────────────────────────────────
        document.getElementById('progressContainer').addEventListener('click', function(e) {
            const ratio  = (e.clientX - this.getBoundingClientRect().left) / this.offsetWidth;
            progress = Math.floor(ratio * songDuration);
            ytCmd('seekTo', [progress, true]);
        });
    </script>
</body>
</html>
