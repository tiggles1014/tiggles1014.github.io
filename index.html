<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I love you aoud</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            height: 100vh;
            overflow: hidden;
            position: relative;
            font-family: 'VT323', monospace;
            color: #ff99cc;
            background: #0a0a0a;
        }
        
        .background {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
           background-image: url('https://raw.githubusercontent.com/Tiggles1014/tiggles1014.github.io//main/Screenshot%202026-06-30%20211543.png');
            background-size: cover;
            background-position: center;
            filter: brightness(0.75) contrast(1.1) saturate(0.9);
            z-index: -3;
        }
        
        .overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(15, 0, 25, 0.78);
            z-index: -2;
        }
        
        .content {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        
        h1 {
            font-size: 5.2rem;
            letter-spacing: 4px;
            color: #ff99cc;
            text-shadow: 3px 3px 0 #000, -2px -2px 0 #000;
            margin-bottom: 8px;
        }
        
        .subtitle {
            font-size: 2.1rem;
            color: #ff77bb;
            margin-bottom: 50px;
        }
        
        /* Mini Player */
        .player {
            width: 440px;
            background: rgba(25, 5, 35, 0.96);
            border: 4px solid #ff66aa;
            padding: 25px 30px;
            border-radius: 8px;
            box-shadow: 0 0 35px rgba(255, 102, 170, 0.5);
            margin-bottom: 40px;
        }
        
        .now-playing {
            font-size: 1.4rem;
            margin-bottom: 12px;
            color: #ffbbdd;
        }
        
        .progress-container {
            height: 8px;
            background: #330022;
            margin: 20px 0;
            position: relative;
            cursor: pointer;
        }
        
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(to right, #ff66aa, #cc44ff);
        }
        
        .time {
            display: flex;
            justify-content: space-between;
            font-size: 1.1rem;
            color: #bb77aa;
        }
        
        .controls {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 25px;
        }
        
        button {
            background: transparent;
            border: 3px solid #ff66aa;
            color: #ffccdd;
            padding: 12px 26px;
            font-size: 1.2rem;
            cursor: pointer;
        }
        
        button:hover {
            background: #ff66aa;
            color: #000;
        }
        
        .footer {
            position: absolute;
            bottom: 35px;
            font-size: 1.2rem;
            color: #996688;
        }
    </style>
</head>
<body>
    <div class="background"></div>
    <div class="overlay"></div>
    
    <div class="content">
        <h1>I LOVE YOU AOUD</h1>
        <div class="subtitle">pupsies</div>
        
        <!-- Mini Player -->
        <div class="player">
            <div class="now-playing">NOW BARKING</div>
            <div style="font-size: 1.55rem; margin-bottom: 10px; color: #ff99cc;">
                why didn't you stop me?
            </div>
            <div style="font-size: 1.05rem; color: #cc77aa;">
                pupsies • 1:44
            </div>
            
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            
            <div class="time">
                <span id="currentTime">0:00</span>
                <span id="duration">1:44</span>
            </div>
            
            <div class="controls">
                <button onclick="togglePlay()">⏸️ / ▶️</button>
                <button onclick="boostVolume()">🔊 MAX</button>
            </div>
        </div>
        
        <div class="footer">
            every 30 seconds a special surprise 💨🐶
        </div>
    </div>

    <!-- Main Song -->
    <iframe id="music" 
            width="0" height="0" 
            src="https://www.youtube.com/embed/xpmf4u5rkNY?autoplay=1&loop=1&playlist=xpmf4u5rkNY" 
            frameborder="0" 
            allow="autoplay; encrypted-media" 
            allowfullscreen>
    </iframe>

    <!-- Bark Fart Sound -->
    <audio id="barkFart" preload="auto">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg"> <!-- Placeholder - replace with real bark fart URL if needed -->
    </audio>

    <script>
        const mainPlayer = document.getElementById('music');
        const barkAudio = document.getElementById('barkFart');
        const progressBar = document.getElementById('progressBar');
        const currentTimeEl = document.getElementById('currentTime');
        
        let isPlaying = true;
        let progress = 0;
        const songDuration = 104; // seconds
        
        // Real bark fart sound (public domain / free meme sound)
        // You can replace this URL with a direct MP3 link
        barkAudio.src = "https://assets.mixkit.co/sfx/preview/2357/2357.wav"; // fart-like sound (adjust if needed)
        
        function togglePlay() {
            isPlaying = !isPlaying;
            if (isPlaying) {
                mainPlayer.src = "https://www.youtube.com/embed/xpmf4u5rkNY?autoplay=1&loop=1&playlist=xpmf4u5rkNY";
            } else {
                mainPlayer.src = "https://www.youtube.com/embed/xpmf4u5rkNY?autoplay=0";
            }
        }
        
        function boostVolume() {
            document.body.style.filter = "saturate(1.8)";
            setTimeout(() => document.body.style.filter = "", 700);
        }
        
        function playBarkFart() {
            barkAudio.currentTime = 0;
            barkAudio.volume = 0.9;
            barkAudio.play().catch(() => {});
        }
        
        // Progress simulation
        function updateProgress() {
            if (!isPlaying) return;
            progress = (progress + 1) % songDuration;
            const percentage = (progress / songDuration) * 100;
            progressBar.style.width = percentage + "%";
            
            const min = Math.floor(progress / 60);
            const sec = Math.floor(progress % 60);
            currentTimeEl.textContent = `${min}:${sec < 10 ? '0' : ''}${sec}`;
        }
        
        // Bark Fart every 30 seconds
        setInterval(() => {
            playBarkFart();
        }, 30000);
        
        // Initial load
        window.addEventListener('load', () => {
            setInterval(updateProgress, 1000);
            
            // Start main song
            setTimeout(() => {
                mainPlayer.src = "https://www.youtube.com/embed/xpmf4u5rkNY?autoplay=1&loop=1&playlist=xpmf4u5rkNY";
            }, 600);
            
            // First bark fart after 5 seconds
            setTimeout(playBarkFart, 5000);
        });
    </script>
</body>
</html>
