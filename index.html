<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aoud.lol</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            height: 100vh;
            overflow: hidden;
            position: relative;
            font-family: 'Inter', sans-serif;
            color: #ff99cc;
            background: #0a0a0a;
        }
        
        .background {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url('bg.png');
            background-size: cover;
            background-position: center;
            filter: brightness(0.75) contrast(1.1) saturate(0.9);
            z-index: -3;
        }
        
        .overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(15, 0, 25, 0.78);
            z-index: -2;
        }
        /* ── Unmute banner ── */
        #unmuteBanner {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 14px;
            background: rgba(255, 80, 150, 0.18);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(255, 102, 170, 0.35);
            cursor: pointer;
            transition: opacity 0.5s ease;
        }
        #unmuteBanner.hidden { opacity: 0; pointer-events: none; }
        #unmuteBanner span {
            font-size: 0.9rem;
            letter-spacing: 2px;
            color: #ffccdd;
        }
        #unmuteBanner .pulse {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: #ff66aa;
            animation: pulse 1.2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: 0.4; transform: scale(0.7); }
        }
        
        .content {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        
        h1 {
            font-size: 5.2rem;
            letter-spacing: 4px;
            color: #ff99cc;
            text-shadow: 3px 3px 0 #000, -2px -2px 0 #000;
            margin-bottom: 8px;
            font-weight: 300;
        }
        
        .subtitle {
            font-size: 2.1rem;
            color: #ff77bb;
            margin-bottom: 50px;
            font-weight: 300;
        }
        
        .player {
            width: 440px;
            background: rgba(25, 5, 35, 0.96);
            border: 4px solid #ff66aa;
            padding: 25px 30px;
            border-radius: 8px;
            box-shadow: 0 0 35px rgba(255, 102, 170, 0.5);
            margin-bottom: 40px;
        }
        
        .now-playing {
            font-size: 0.85rem;
            letter-spacing: 3px;
            margin-bottom: 14px;
            color: #ffbbdd;
            text-transform: uppercase;
        }
        .song-title {
            font-size: 1.4rem;
            margin-bottom: 6px;
            color: #ff99cc;
            font-weight: 400;
        }
        .song-meta {
            font-size: 0.9rem;
            color: #cc77aa;
            margin-bottom: 4px;
        }
        
        .progress-container {
            height: 6px;
            background: #330022;
            margin: 20px 0;
            position: relative;
            cursor: pointer;
            border-radius: 3px;
        }
        
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(to right, #ff66aa, #cc44ff);
            transition: width 0.9s linear;
            border-radius: 3px;
        }
        
        .time {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: #bb77aa;
        }
        
        .controls {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 22px;
        }
        
        button {
            background: transparent;
            border: 2px solid #ff66aa;
            color: #ffccdd;
            padding: 9px 22px;
            font-size: 0.88rem;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            letter-spacing: 1px;
            transition: background 0.15s, color 0.15s;
            border-radius: 4px;
        }
        
        button:hover {
            background: #ff66aa;
            color: #000;
        }
        /* Hidden YouTube player — real size, off-screen */
        #ytPlayer {
            position: fixed;
            left: -9999px;
            top: 0;
            width: 480px;
            height: 270px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <!-- Muted autoplay starts immediately; user clicks this to unmute -->
    <div id="unmuteBanner" onclick="unmute()">
        <div class="pulse"></div>
        <span>🎵 CLICK ANYWHERE TO UNMUTE</span>
        <div class="pulse"></div>
    </div>
    <div class="background"></div>
    <div class="overlay"></div>
    
    <div class="content">
        <h1>aoud.lol</h1>
        <div class="subtitle">pupsies</div>
        
        <div class="player">
            <div class="now-playing">Now Playing</div>
            <div class="song-title">why didn't you stop me?</div>
            <div class="song-meta">pupsies &nbsp;·&nbsp; 1:44</div>
            
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            
            <div class="time">
                <span id="currentTime">0:00</span>
                <span id="duration">1:44</span>
            </div>
            
            <div class="controls">
                <button id="playPauseBtn" onclick="togglePlay()">⏸ Pause</button>
                <button id="volBtn" onclick="toggleBoost()">🔊 Ultra Loud</button>
            </div>
        </div>
    </div>
    <!--
        autoplay=1  → starts playing immediately (muted, so browser allows it)
        mute=1      → muted = browser allows autoplay
        loop=1      → loops forever
        controls=0  → hide YouTube UI
        enablejsapi=1 → lets us send postMessage commands
    -->
    <div id="ytPlayer"></div>
    <script>
        // Load the YouTube IFrame Player API asynchronously
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        const playlist = [
            { "title": "Caramelldansen", "artist": "Caramella Girls", "ytId": "PDJLvF1dUek" },
            { "title": "Renai Circulation (English Cover) [2012 TV Size]", "artist": "Lizz Robinett, L-Train, Y. Chang", "ytId": "o874A-IsrvQ" },
            { "title": "Pretty Scene Girl!", "artist": "Clover!, DulaWry", "ytId": "P8F1RjcWLjM" },
            { "title": "doodle", "artist": "Zachz Winner", "ytId": "DYgER2Tq50o" },
            { "title": "I'm so fucked up please help me", "artist": "Rebzyyx", "ytId": "hWm5PdmPgbs" },
            { "title": "hunter eyes", "artist": "laydownrot", "ytId": "AVPbuiJ3-xQ" },
            { "title": "Lucky", "artist": "Lucky Twice", "ytId": "2UuXld2s6g0" },
            { "title": "1tap", "artist": "Chanelfather", "ytId": "1GhwgjNN1H0" },
            { "title": "SugarCrash!", "artist": "ElyOtto", "ytId": "6uaq8GJJxAQ" },
            { "title": "LESBIAN PONIES WITH WEAPONS", "artist": "Vylet Pony", "ytId": "UCAisUe6-VA" },
            { "title": "Toxic Love!", "artist": "Clover!, NXTY", "ytId": "MVypbjxD6GU" },
            { "title": "pretty lil psycho", "artist": "Clover!, disoc8", "ytId": "B5lx9ecnpxw" },
            { "title": "It's Not Like I Like You!!", "artist": "Static-P", "ytId": "tOzOD-82mW0" },
            { "title": "#goonnshit", "artist": "Kevinhilfiger, osquinn", "ytId": "NVJNzydEefc" },
            { "title": "nostalgia will kill me one day", "artist": "rufflws, oktxy, scarby", "ytId": "D9tBmUXTGtI" },
            { "title": "makes you happy", "artist": "hoshie star, Kaneda7, Rebzyyx", "ytId": "O9_vX7vMkes" },
            { "title": "do you like it", "artist": "hoshie star, zeija", "ytId": "F5xRvbYrqYE" },
            { "title": "kiss me!", "artist": "txtsu", "ytId": "W-BqNjA6W0c" },
            { "title": "feels good", "artist": "yen archive, aidenchrist", "ytId": "yhzu9ebHcYQ" },
            { "title": "Bright", "artist": "saturn", "ytId": "4E-p2UzGT9I" },
            { "title": "Faneto", "artist": "Chief Keef", "ytId": "XuEx6lNHZjM" },
            { "title": "qpid", "artist": "saturn", "ytId": "7jJByBGCbz0" },
            { "title": "letz 5hake", "artist": "saturn", "ytId": "_AJUOBnMDzI" },
            { "title": "i hate it here", "artist": "osquinn", "ytId": "5IWw8ox6u40" },
            { "title": "meangirls", "artist": "saturn", "ytId": "EgEar9iBFCU" },
            { "title": "leaveamsg", "artist": "morgue", "ytId": "qNU6aISOOjE" },
            { "title": "Days", "artist": "saturn, osquinn", "ytId": "xHR-wHSLga4" },
            { "title": "eat ur heart", "artist": "luvwillow", "ytId": "oLriHy6zaO8" },
            { "title": "who was", "artist": "Wido", "ytId": "4u8Evmukllk" },
            { "title": "Less Intro", "artist": "saturn", "ytId": "0YSBgaTOHOE" }
        ];

        const progressBar   = document.getElementById('progressBar');
        const currentTimeEl = document.getElementById('currentTime');
        const playPauseBtn  = document.getElementById('playPauseBtn');
        const volBtn        = document.getElementById('volBtn');
        const unmuteBanner  = document.getElementById('unmuteBanner');
        
        let player;
        let isPlaying = true;
        let isMuted   = true;
        let isBoosted = false;
        
        let currentTrack = null;
        let playedTracks = [];

        // ── YouTube IFrame Player API Initialization ────────────────────
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('ytPlayer', {
                height: '270',
                width: '480',
                videoId: playlist[0].ytId,
                playerVars: {
                    'autoplay': 1,
                    'mute': 1,
                    'controls': 0,
                    'disablejsapi': 1,
                    'rel': 0,
                    'modestbranding': 1
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function onPlayerReady(event) {
            playRandomTrack();
        }

        function onPlayerStateChange(event) {
            // Pick a new random song when the current one ends
            if (event.data === YT.PlayerState.ENDED) {
                playRandomTrack();
            }
        }

        // ── Track Selection ─────────────────────────────────────────────
        function playRandomTrack() {
            if (playlist.length === 0) return;
            
            // Avoid repeating songs until all have been played
            if (playedTracks.length >= playlist.length) {
                playedTracks = [];
            }
            
            let availableTracks = playlist.filter(track => !playedTracks.includes(track.ytId));
            if (availableTracks.length === 0) {
                availableTracks = playlist;
                playedTracks = [];
            }
            
            const randomIndex = Math.floor(Math.random() * availableTracks.length);
            const track = availableTracks[randomIndex];
            playedTracks.push(track.ytId);
            
            currentTrack = track;
            
            // Update UI with details
            document.querySelector('.song-title').textContent = track.title;
            document.querySelector('.song-meta').innerHTML = `${track.artist} &nbsp;·&nbsp; 0:00`;
            document.getElementById('currentTime').textContent = '0:00';
            document.getElementById('duration').textContent = '0:00';
            progressBar.style.width = '0%';
            
            if (player && player.loadVideoById) {
                player.loadVideoById({
                    videoId: track.ytId,
                    startSeconds: 0
                });
                
                isPlaying = true;
                playPauseBtn.textContent = '⏸ Pause';
                
                if (isMuted) {
                    player.mute();
                } else {
                    player.unMute();
                    player.setVolume(isBoosted ? 100 : 80);
                }
            }
        }

        // ── Unmute on first click ───────────────────────────────────────
        function unmute() {
            if (player && player.unMute) {
                player.unMute();
                player.setVolume(isBoosted ? 100 : 80);
                isMuted = false;
                unmuteBanner.classList.add('hidden');
            }
        }
        
        document.body.addEventListener('click', function onFirstClick(e) {
            if (isMuted) {
                unmute();
            }
        }, { once: false });

        // ── Play / Pause ────────────────────────────────────────────────
        function togglePlay() {
            if (!player || !player.pauseVideo) return;
            if (isPlaying) {
                player.pauseVideo();
                isPlaying = false;
                playPauseBtn.textContent = '▶ Play';
            } else {
                player.playVideo();
                isPlaying = true;
                playPauseBtn.textContent = '⏸ Pause';
            }
        }

        // ── Volume boost ────────────────────────────────────────────────
        function toggleBoost() {
            if (!player || !player.setVolume) return;
            if (isBoosted) {
                player.setVolume(80);
                isBoosted = false;
                volBtn.textContent = '🔊 Ultra Loud';
            } else {
                player.setVolume(100);
                isBoosted = true;
                volBtn.textContent = '🔇 Normal';
            }
        }

        // ── Helper: Format seconds to M:SS ──────────────────────────────
        function formatTime(seconds) {
            if (isNaN(seconds) || seconds === null) return "0:00";
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${min}:${sec < 10 ? '0' : ''}${sec}`;
        }

        // ── Progress Bar Update (Accurate from YouTube player) ──────────
        setInterval(() => {
            if (player && player.getCurrentTime && isPlaying) {
                const current = player.getCurrentTime();
                const duration = player.getDuration();
                if (duration > 0) {
                    progressBar.style.width = (current / duration * 100) + '%';
                    currentTimeEl.textContent = formatTime(current);
                    document.getElementById('duration').textContent = formatTime(duration);
                    
                    const songMeta = document.querySelector('.song-meta');
                    if (songMeta && currentTrack) {
                        songMeta.innerHTML = `${currentTrack.artist} &nbsp;·&nbsp; ${formatTime(duration)}`;
                    }
                }
            }
        }, 500);

        // ── Click progress bar to seek ──────────────────────────────────
        document.getElementById('progressContainer').addEventListener('click', function(e) {
            if (player && player.getDuration) {
                const ratio  = (e.clientX - this.getBoundingClientRect().left) / this.offsetWidth;
                const newTime = ratio * player.getDuration();
                player.seekTo(newTime, true);
            }
        });
    </script>
</body>
</html>
