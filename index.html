<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I love you aoud</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            height: 100vh;
            overflow: hidden;
            position: relative;
            font-family: 'VT323', monospace;
            color: #ff99cc;
            background: #0a0a0a;
        }
        
        .background {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url('https://raw.githubusercontent.com/tiggles/tiggles1014.github.io/main/Screenshot%202026-06-30%20211543.png');
            background-size: cover;
            background-position: center;
            filter: brightness(0.75) contrast(1.1) saturate(0.9);
            z-index: -3;
        }
        
        .overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(15, 0, 25, 0.78);
            z-index: -2;
        }
        
        .content {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        
        h1 {
            font-size: 5.2rem;
            letter-spacing: 4px;
            color: #ff99cc;
            text-shadow: 3px 3px 0 #000, -2px -2px 0 #000;
            margin-bottom: 8px;
        }
        
        .subtitle {
            font-size: 2.1rem;
            color: #ff77bb;
            margin-bottom: 50px;
        }
        
        .player {
            width: 440px;
            background: rgba(25, 5, 35, 0.96);
            border: 4px solid #ff66aa;
            padding: 25px 30px;
            border-radius: 8px;
            box-shadow: 0 0 35px rgba(255, 102, 170, 0.5);
            margin-bottom: 40px;
        }
        
        .now-playing {
            font-size: 1.4rem;
            margin-bottom: 12px;
            color: #ffbbdd;
        }
        
        .progress-container {
            height: 8px;
            background: #330022;
            margin: 20px 0;
            position: relative;
            cursor: pointer;
        }
        
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(to right, #ff66aa, #cc44ff);
            transition: width 0.9s linear;
        }
        
        .time {
            display: flex;
            justify-content: space-between;
            font-size: 1.1rem;
            color: #bb77aa;
        }
        
        .controls {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 25px;
        }
        
        button {
            background: transparent;
            border: 3px solid #ff66aa;
            color: #ffccdd;
            padding: 12px 26px;
            font-size: 1.2rem;
            cursor: pointer;
            font-family: 'VT323', monospace;
            transition: background 0.15s, color 0.15s;
        }
        
        button:hover {
            background: #ff66aa;
            color: #000;
        }
        .flash {
            animation: flashPulse 0.7s ease-out;
        }
        @keyframes flashPulse {
            0%   { filter: saturate(3) brightness(1.4); }
            100% { filter: saturate(1) brightness(1); }
        }
        
        .footer {
            position: absolute;
            bottom: 35px;
            font-size: 1.2rem;
            color: #996688;
        }
        /* YouTube iframe hidden offscreen */
        #ytplayer {
            position: absolute;
            left: -9999px;
            top: -9999px;
            width: 1px;
            height: 1px;
        }
    </style>
</head>
<body>
    <div class="background"></div>
    <div class="overlay"></div>
    
    <div class="content">
        <h1>I LOVE YOU AOUD</h1>
        <div class="subtitle">pupsies</div>
        
        <div class="player">
            <div class="now-playing">NOW BARKING</div>
            <div style="font-size: 1.55rem; margin-bottom: 10px; color: #ff99cc;">
                why didn't you stop me?
            </div>
            <div style="font-size: 1.05rem; color: #cc77aa;">
                pupsies • 1:44
            </div>
            
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            
            <div class="time">
                <span id="currentTime">0:00</span>
                <span id="duration">1:44</span>
            </div>
            
            <div class="controls">
                <button id="playPauseBtn" onclick="togglePlay()">⏸ PAUSE</button>
                <button onclick="boostVolume()">🔊 ULTRA LOUD</button>
            </div>
        </div>
        
        <div class="footer">
            every 30 seconds a special surprise 💨🐶
        </div>
    </div>
    <!-- YouTube IFrame API -->
    <div id="ytplayer"></div>
    <!-- Bark Fart Sound -->
    <audio id="barkFart" preload="auto">
        <source src="https://raw.githubusercontent.com/tiggles/tiggles1014.github.io/main/bark-fart-made-with-Voicemod.mp3" type="audio/mpeg">
    </audio>
    <!-- Load YouTube IFrame API -->
    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const barkAudio    = document.getElementById('barkFart');
        const progressBar  = document.getElementById('progressBar');
        const currentTimeEl = document.getElementById('currentTime');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const songDuration = 104; // 1:44 in seconds
        let isPlaying  = false;   // starts false; set true once API is ready
        let progress   = 0;
        let ytPlayer   = null;
        let isBoosted  = false;
        // ── YouTube IFrame API ──────────────────────────────────────────────
        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('ytplayer', {
                videoId: 'xpmf4u5rkNY',
                playerVars: {
                    autoplay: 1,
                    loop:     1,
                    playlist: 'xpmf4u5rkNY',
                    controls: 0,
                    modestbranding: 1,
                },
                events: {
                    onReady: onPlayerReady,
                    onStateChange: onPlayerStateChange,
                }
            });
        }
        function onPlayerReady(event) {
            event.target.setVolume(80);
            event.target.playVideo();
            isPlaying = true;
            updatePlayPauseBtn();
            // Start simulated progress bar
            setInterval(tickProgress, 1000);
            // First bark after 4.5 s
            setTimeout(playBarkFart, 4500);
            // Bark every 30 s
            setInterval(playBarkFart, 30000);
        }
        function onPlayerStateChange(event) {
            // YT.PlayerState: PLAYING=1, PAUSED=2, ENDED=0
            if (event.data === YT.PlayerState.PLAYING) {
                isPlaying = true;
            } else if (event.data === YT.PlayerState.PAUSED || event.data === YT.PlayerState.ENDED) {
                isPlaying = false;
                if (event.data === YT.PlayerState.ENDED) {
                    // Loop: restart
                    ytPlayer.seekTo(0);
                    ytPlayer.playVideo();
                }
            }
            updatePlayPauseBtn();
        }
        // ── Controls ────────────────────────────────────────────────────────
        function togglePlay() {
            if (!ytPlayer) return;
            if (isPlaying) {
                ytPlayer.pauseVideo();
            } else {
                ytPlayer.playVideo();
            }
        }
        function updatePlayPauseBtn() {
            playPauseBtn.textContent = isPlaying ? '⏸ PAUSE' : '▶ PLAY';
        }
        function boostVolume() {
            if (!ytPlayer) return;
            if (isBoosted) {
                ytPlayer.setVolume(80);
                isBoosted = false;
                boostVolume.btn = '🔊 ULTRA LOUD';
                document.querySelector('button:last-child').textContent = '🔊 ULTRA LOUD';
            } else {
                ytPlayer.setVolume(100);
                isBoosted = true;
                document.querySelector('button:last-child').textContent = '🔇 NORMAL';
                // Flash effect
                document.body.classList.add('flash');
                document.body.addEventListener('animationend', () => {
                    document.body.classList.remove('flash');
                }, { once: true });
            }
        }
        // ── Bark Fart ───────────────────────────────────────────────────────
        function playBarkFart() {
            barkAudio.currentTime = 0;
            barkAudio.volume = 0.95;
            barkAudio.play().catch(() => {});
        }
        // ── Progress Bar (simulated, syncs on loop) ─────────────────────────
        function tickProgress() {
            if (!isPlaying) return;
            // Try to sync with actual YouTube time if available
            if (ytPlayer && typeof ytPlayer.getCurrentTime === 'function') {
                try {
                    const actual = ytPlayer.getCurrentTime();
                    if (actual > 0) {
                        progress = actual % songDuration;
                    } else {
                        progress = (progress + 1) % songDuration;
                    }
                } catch(e) {
                    progress = (progress + 1) % songDuration;
                }
            } else {
                progress = (progress + 1) % songDuration;
            }
            const percentage = (progress / songDuration) * 100;
            progressBar.style.width = percentage + '%';
            const min = Math.floor(progress / 60);
            const sec = Math.floor(progress % 60);
            currentTimeEl.textContent = `${min}:${sec < 10 ? '0' : ''}${sec}`;
        }
        // ── Click progress bar to seek ───────────────────────────────────────
        document.getElementById('progressContainer').addEventListener('click', function(e) {
            const rect = this.getBoundingClientRect();
            const ratio = (e.clientX - rect.left) / rect.width;
            const seekTo = ratio * songDuration;
            progress = seekTo;
            if (ytPlayer && typeof ytPlayer.seekTo === 'function') {
                ytPlayer.seekTo(seekTo, true);
            }
        });
    </script>
</body>
</html>
