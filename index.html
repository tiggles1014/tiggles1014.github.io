<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aoud.lol</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            height: 100vh;
            overflow: hidden;
            position: relative;
            font-family: 'VT323', monospace;
            color: #ff99cc;
            background: #0a0a0a;
        }
        
        /* Background */
        .background {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url('https://grok.x.ai/attachments/Screenshot%202026-06-30%20211543.png');
            background-size: cover;
            background-position: center;
            filter: brightness(0.75) contrast(1.1) saturate(0.9);
            z-index: -3;
        }
        
        .overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(10, 0, 20, 0.75);
            z-index: -2;
        }
        
        .content {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        
        h1 {
            font-size: 5.5rem;
            letter-spacing: 6px;
            color: #ff99cc;
            text-shadow: 3px 3px 0 #000,
                        -2px -2px 0 #000;
            margin-bottom: 10px;
        }
        
        .subtitle {
            font-size: 1.8rem;
            color: #cc88ff;
            margin-bottom: 50px;
        }
        
        /* Mini Player */
        .player {
            width: 420px;
            background: rgba(20, 0, 30, 0.95);
            border: 4px solid #ff66aa;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(255, 102, 170, 0.4);
            margin-bottom: 40px;
        }
        
        .now-playing {
            font-size: 1.3rem;
            margin-bottom: 15px;
            color: #ffccdd;
        }
        
        .progress-container {
            height: 8px;
            background: #330022;
            margin: 20px 0;
            position: relative;
            cursor: pointer;
        }
        
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(to right, #ff66aa, #cc44ff);
            transition: width 0.3s;
        }
        
        .time {
            display: flex;
            justify-content: space-between;
            font-size: 1rem;
            color: #bb77aa;
        }
        
        .controls {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
        }
        
        button {
            background: transparent;
            border: 3px solid #ff66aa;
            color: #ffccdd;
            padding: 12px 24px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        button:hover {
            background: #ff66aa;
            color: #000;
        }
        
        .footer {
            position: absolute;
            bottom: 30px;
            font-size: 1.1rem;
            color: #996688;
        }
    </style>
</head>
<body>
    <div class="background"></div>
    <div class="overlay"></div>
    
    <div class="content">
        <h1>AOUD.LOL</h1>
        <div class="subtitle">pupsies</div>
        
        <!-- Mini Player -->
        <div class="player">
            <div class="now-playing">NOW PLAYING</div>
            <div style="font-size: 1.5rem; margin-bottom: 10px; color: #ff99cc;">
                why didn't you stop me?
            </div>
            <div style="font-size: 1rem; color: #cc77aa; margin-bottom: 20px;">
                pupsies • i took too many ibuprofen
            </div>
            
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            
            <div class="time">
                <span id="currentTime">0:00</span>
                <span id="duration">1:44</span>
            </div>
            
            <div class="controls">
                <button onclick="togglePlay()">⏸️ / ▶️</button>
                <button onclick="boostVolume()">🔊 LOUDER</button>
            </div>
        </div>
        
        <div class="footer">
            turn your volume up • headphones on
        </div>
    </div>

    <!-- YouTube Player -->
    <iframe id="music" 
            width="0" height="0" 
            src="https://www.youtube.com/embed/xpmf4u5rkNY?autoplay=1&loop=1&playlist=xpmf4u5rkNY" 
            frameborder="0" 
            allow="autoplay; encrypted-media" 
            allowfullscreen>
    </iframe>

    <script>
        const player = document.getElementById('music');
        const progressBar = document.getElementById('progressBar');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');
        
        let isPlaying = true;
        let progress = 0;
        const songDuration = 104; // 1:44 in seconds
        
        function togglePlay() {
            isPlaying = !isPlaying;
            if (isPlaying) {
                player.src = "https://www.youtube.com/embed/xpmf4u5rkNY?autoplay=1&loop=1&playlist=xpmf4u5rkNY";
            } else {
                player.src = "https://www.youtube.com/embed/xpmf4u5rkNY?autoplay=0";
            }
        }
        
        function boostVolume() {
            document.body.style.filter = "saturate(1.6) contrast(1.2)";
            setTimeout(() => document.body.style.filter = "", 600);
            alert("🔊 MAX VOLUME ACTIVATED");
        }
        
        // Fake progress bar (real sync is complex without YouTube API)
        function updateProgress() {
            if (!isPlaying) return;
            
            progress = (progress + 1) % songDuration;
            const percentage = (progress / songDuration) * 100;
            progressBar.style.width = percentage + "%";
            
            const currentMin = Math.floor(progress / 60);
            const currentSec = Math.floor(progress % 60);
            currentTimeEl.textContent = `${currentMin}:${currentSec < 10 ? '0' : ''}${currentSec}`;
        }
        
        // Auto start
        window.addEventListener('load', () => {
            setInterval(updateProgress, 1000);
            
            // Force autoplay
            setTimeout(() => {
                player.src = "https://www.youtube.com/embed/xpmf4u5rkNY?autoplay=1&loop=1&playlist=xpmf4u5rkNY";
            }, 500);
        });
        
        // Click to seek on progress bar
        document.getElementById('progressContainer').addEventListener('click', (e) => {
            const rect = e.currentTarget.getBoundingClientRect();
            const pos = (e.clientX - rect.left) / rect.width;
            progress = Math.floor(pos * songDuration);
        });
    </script>
</body>
</html>
